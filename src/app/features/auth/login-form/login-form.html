<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  @if (serverError()) {
    <p class="form-error" role="alert"><span>!</span>{{ serverError() }}</p>
  }

  <div class="field">
    <label for="log-email">Correo electrónico</label>
    <input
      id="log-email"
      type="email"
      autocomplete="email"
      formControlName="email"
      [class.invalid]="showError('email')"
    />
    @if (showError('email')) {
      <p class="field-error">
        Escribe un correo con formato válido, por ejemplo nombre&#64;dominio.com.
      </p>
    }
  </div>

  <div class="field">
    <label for="log-password">Contraseña</label>
    <input
      id="log-password"
      type="password"
      autocomplete="current-password"
      formControlName="password"
      [class.invalid]="showError('password')"
    />
    @if (showError('password')) {
      <p class="field-error">Escribe tu contraseña.</p>
    }
  </div>

  <button type="submit" class="btn btn-primary btn-block" [disabled]="submitting()">
    {{ submitting() ? 'Verificando…' : 'Entrar' }}
  </button>
</form>
